<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File sharing system CA-2 | Upload</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>
  <div class="top-bar">
    <a href="/"><img src="logo.png" alt="Logo" class="site-logo"></a>
  </div>
  <div class="container">
    <div class="glass-panel">
      <div class="header">
        <h1><a href="/">File sharing system CA-2</a></h1>
        <p>Encrypt and share files seamlessly</p>
        <ul class="features-list">
          <li>✨ Up to 50MB</li>
          <li>⚡ Fast transfers</li>
          <li>🔒 Secure PIN sharing</li>
        </ul>
      </div>

      <form id="uploadForm">
        <div class="upload-area" id="dropZone">
          <div class="upload-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
          </div>
          <div class="upload-text" id="uploadText">Drag & Drop or Click to Upload</div>
          <div class="upload-subtext">Max file size: 50MB</div>
          <input type="file" id="fileInput" name="file" required>
        </div>

        <div class="form-group pin-toggle-group">
          <label class="toggle-switch">
            <input type="checkbox" id="pinToggle">
            <span class="slider"></span>
          </label>
          <span class="toggle-label">Set a PIN for this upload</span>
        </div>

        <div class="form-group hidden" id="pinInputGroup">
          <input type="password" id="pinInput" class="input-field" placeholder="Enter a secure PIN" autocomplete="off">
        </div>

        <button type="submit" class="btn btn-primary" id="uploadBtn">
          <span class="btn-text">Generate Secure Link</span>
          <div class="loader" id="uploadLoader"></div>
        </button>
      </form>

      <div class="result-box" id="resultBox">
        <div class="result-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
          Upload Successful!
        </div>
        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem;">
          Share this link. Anyone with the link <span id="pinWarning" class="hidden">(and the PIN)</span> can download the file.
        </p>
        <div class="link-container">
          <div class="link-input" id="shareLink"></div>
          <button type="button" class="btn-icon" id="copyBtn" title="Copy to clipboard">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
